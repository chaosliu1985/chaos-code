<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xiaoliumin Fortune Telling</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
        }
        #fortune {
            margin: 20px auto;
            padding: 20px;
            background-color: white;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            width: 80%;
            max-width: 600px;
        }
        button {
            display: block;
            margin: 0 auto;
            padding: 10px 20px;
            font-size: 16px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
        }
        button:hover {
            background-color: #2980b9;
        }
    </style>
</head>
<body>
    <h1>Xiaoliumin Fortune Telling</h1>
    <div id="fortune">
        <p id="fortune-text">Press the button to reveal your fortune!</p>
    </div>
    <button id="reveal-fortune">Reveal Fortune</button>
    <script>
        const fortunes = [
            'You will have a great day!',
            'Expect the unexpected today.',
            'You will meet someone special soon.',
            'Success is in your future.',
            'Beware of false friends.',
            'Today is a lucky day for you.',
            'You will achieve your goals.',
            'A pleasant surprise is waiting for you.'
        ];

        document.getElementById('reveal-fortune').addEventListener('click', function() {
            const randomIndex = Math.floor(Math.random() * fortunes.length);
            document.getElementById('fortune-text').innerText = fortunes[randomIndex];
        });
    </script>
</body>
</html>
